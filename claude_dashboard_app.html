<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mini BI Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial; margin: 0; display: flex; height: 100vh; }
    #sidebar { width: 250px; background: #f4f4f4; padding: 10px; overflow-y: auto; }
    #main { flex: 1; padding: 20px; }
    canvas { max-width: 100%; }
    select, button { width: 100%; margin-bottom: 10px; padding: 5px; }
  </style>
</head>
<body>

<div id="sidebar">
  <h3>Upload CSV</h3>
  <input type="file" id="fileInput" accept=".csv">

  <h3>Fields</h3>
  <label>X Axis</label>
  <select id="xSelect"></select>

  <label>Y Axis</label>
  <select id="ySelect"></select>

  <label>Chart Type</label>
  <select id="chartType">
    <option value="bar">Bar</option>
    <option value="line">Line</option>
    <option value="pie">Pie</option>
  </select>

  <button onclick="renderChart()">Render Chart</button>
</div>

<div id="main">
  <h2>Dashboard</h2>
  <canvas id="chart"></canvas>
</div>

<script>
let data = [];
let headers = [];
let chart;

document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(event) {
    const text = event.target.result;
    parseCSV(text);
  };

  reader.readAsText(file);
});

function parseCSV(text) {
  const rows = text.split('\n').map(r => r.split(','));
  headers = rows[0];
  data = rows.slice(1);

  const xSelect = document.getElementById('xSelect');
  const ySelect = document.getElementById('ySelect');

  xSelect.innerHTML = '';
  ySelect.innerHTML = '';

  headers.forEach((h, i) => {
    xSelect.innerHTML += `<option value="${i}">${h}</option>`;
    ySelect.innerHTML += `<option value="${i}">${h}</option>`;
  });
}

function renderChart() {
  const xIndex = document.getElementById('xSelect').value;
  const yIndex = document.getElementById('ySelect').value;
  const type = document.getElementById('chartType').value;

  const labels = data.map(row => row[xIndex]);
  const values = data.map(row => parseFloat(row[yIndex]) || 0);

  const ctx = document.getElementById('chart').getContext('2d');

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: type,
    data: {
      labels: labels,
      datasets: [{
        label: headers[yIndex],
        data: values
      }]
    }
  });
}
</script>

</body>
</html>
